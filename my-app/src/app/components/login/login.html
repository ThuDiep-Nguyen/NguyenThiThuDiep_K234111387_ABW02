<div class="login-wrapper">
  <div class="login-box">
    <h2>Login</h2>
    <div class="form-group">
      <label>Username</label>
      <input type="text" [(ngModel)]="username" class="form-control">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" class="form-control">
    </div>
    <div *ngIf="error" class="error">{{error}}</div>
    <div *ngIf="success" class="success" style="color: green; margin-top: 8px;">{{success}}</div>
    <button (click)="login()" class="btn-login">Login</button>
  </div>
</div>
<div style="margin-top: 24px; text-align: left;">
    <strong>Demo:</strong><br>
    <span>Employee: <b>admin</b> / <b>123456</b></span><br>
    <span>Customer: <b>diep</b> / <b>123456</b></span>
  </div>

<div class="order-container">
  <h2>Your Order</h2>

  <table *ngIf="items.length > 0">
    <thead>
      <tr>
        <th>Product</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Subtotal</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of items; let i = index">
        <td>{{item.product.name}}</td>
        <td>{{item.product.price | currency:'VND':'symbol':'1.0-0'}}</td>
        <td>
          <input type="number" [value]="item.quantity" (change)="updateQty(i, $event)" min="1">
        </td>
        <td>{{item.product.price * item.quantity | currency:'VND':'symbol':'1.0-0'}}</td>
        <td><button (click)="remove(i)" class="btn-remove">Remove</button></td>
      </tr>
    </tbody>
  </table>

  <h3 *ngIf="items.length > 0">Total: {{total | currency:'VND':'symbol':'1.0-0'}}</h3>

  <div *ngIf="items.length === 0">
    <p>Your order is empty.</p>
  </div>

  <div class="actions">
    <button (click)="buyMore()" class="btn-secondary">Buy More Products</button>
    <button *ngIf="items.length > 0" (click)="payment()" class="btn-primary">Payment (Finish Order)</button>
  </div>
</div>
